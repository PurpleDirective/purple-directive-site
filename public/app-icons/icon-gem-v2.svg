<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <!--
    logo-gem refined — v2
    Changes from original:
      - Gem: 35px → 55px radius (56% larger — was undersized)
      - Background: rx="80" rounded corners + stronger radial glow
      - Hex ring: opacity 0.45 → 0.58, fill slightly brighter
      - Gem gradient: brighter lavender top (#B8A8D0 → #D0C0EC)
      - Gem glow: stronger filter + outer glow circle
      - Y body: richer purple fill (#28194A → #2E1C54) + subtle edge
      - Calligraphic details: opacity ~25% boost for visibility
      - Output at 1024×1024 (viewBox stays 512×512, scales uniformly)
  -->
  <defs>
    <!-- Gem facet gradients — brighter lavender -->
    <radialGradient id="gemBase" cx="42%" cy="34%" r="60%" fx="38%" fy="30%">
      <stop offset="0%"  style="stop-color:#D0C0EC;stop-opacity:0.97"/>
      <stop offset="16%" style="stop-color:#B0A0D4;stop-opacity:0.97"/>
      <stop offset="44%" style="stop-color:#8870B4"/>
      <stop offset="74%" style="stop-color:#60489A"/>
      <stop offset="100%" style="stop-color:#3E2870"/>
    </radialGradient>
    <linearGradient id="faceTopL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#E0D0F8;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#9080C0;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="faceTopR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#B8A8D8;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#7068B0;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="faceBotL" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#281848;stop-opacity:0.50"/>
      <stop offset="100%" style="stop-color:#5A4888;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="faceBotR" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   style="stop-color:#1A1030;stop-opacity:0.60"/>
      <stop offset="100%" style="stop-color:#4A3878;stop-opacity:0.06"/>
    </linearGradient>

    <!-- Background ambient glow — stronger than original -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="48%">
      <stop offset="0%"   style="stop-color:#3A2870;stop-opacity:0.30"/>
      <stop offset="55%"  style="stop-color:#1A1040;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#06040C;stop-opacity:0"/>
    </radialGradient>

    <!-- Gem outer glow ring (new) -->
    <radialGradient id="gemHalo" cx="50%" cy="50%" r="50%">
      <stop offset="40%"  style="stop-color:#7858A8;stop-opacity:0"/>
      <stop offset="72%"  style="stop-color:#7858A8;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#7858A8;stop-opacity:0"/>
    </radialGradient>

    <!-- Gem filters — enhanced -->
    <filter id="gemSoft">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gemDrop">
      <feDropShadow dx="0" dy="2.5" stdDeviation="5" flood-color="#0A0612" flood-opacity="0.65"/>
    </filter>

    <!-- Y shape mask — unchanged from original -->
    <mask id="yMask">
      <rect width="512" height="512" fill="black"/>
      <path d="
        M 238,126 L 274,126
        L 274,247
        L 372,316 L 352,346
        L 256,278
        L 160,346 L 140,316
        L 238,247
        Z" fill="white"/>
    </mask>
  </defs>

  <!-- Background — rounded corners for app icon -->
  <rect width="512" height="512" fill="#06040C" rx="80"/>

  <!-- Ambient background glow — stronger than original -->
  <circle cx="256" cy="256" r="165" fill="url(#bgGlow)"/>

  <!-- ═══ HEXAGON RING — more present than original ═══ -->
  <!-- Outer hex R=126, slightly brighter lavender -->
  <polygon points="256,130 365,193 365,319 256,382 147,319 147,193"
    fill="#503878" stroke="#807890" stroke-width="1.2" opacity="0.58"/>
  <!-- Inner hex R=114, background fill -->
  <polygon points="256,142 355,199 355,313 256,370 157,313 157,199"
    fill="#06040C" stroke="#807890" stroke-width="1.2" opacity="0.52"/>

  <!-- ═══ Y BODY ═══ -->
  <!-- Edge outline -->
  <path d="
    M 237,125 L 275,125
    L 275,247
    L 373,315 L 353,347
    L 256,279
    L 159,347 L 139,315
    L 237,247
    Z"
    fill="none" stroke="#000000" stroke-width="1.5" opacity="0.65" stroke-linejoin="miter"/>

  <!-- Fill — richer purple than original #28194A -->
  <path d="
    M 238,126 L 274,126
    L 274,247
    L 372,316 L 352,346
    L 256,278
    L 160,346 L 140,316
    L 238,247
    Z"
    fill="#2E1C54"/>

  <!-- ═══ CALLIGRAPHIC INTERIOR (masked to Y) — opacity boosted ~25% ═══ -->
  <g mask="url(#yMask)">

    <!-- ── Stem ── -->
    <path d="M 250,134 Q 266,148 248,168 Q 240,182 264,196 Q 268,206 256,214"
      fill="none" stroke="#7060A0" stroke-width="1.8" stroke-linecap="round" opacity="0.26"/>
    <path d="M 262,138 Q 248,155 264,175 Q 270,186 250,200 Q 248,208 260,214"
      fill="none" stroke="#6050908" stroke-width="0.9" stroke-linecap="round" opacity="0.20"/>
    <path d="M 245,148 Q 234,154 236,164 Q 238,172 248,170"
      fill="none" stroke="#7868A8" stroke-width="0.7" opacity="0.22"/>
    <path d="M 267,178 Q 278,183 277,192 Q 275,200 264,198"
      fill="none" stroke="#7868A8" stroke-width="0.7" opacity="0.22"/>
    <circle cx="237" cy="158" r="1.8" fill="#7060A0" opacity="0.16"/>
    <circle cx="277" cy="186" r="1.8" fill="#7060A0" opacity="0.16"/>
    <circle cx="244" cy="202" r="1.5" fill="#7060A0" opacity="0.14"/>

    <!-- ── Left arm ── -->
    <path d="M 230,278 Q 218,292 208,298 Q 194,306 186,316 Q 176,324 166,330 Q 156,338 148,344"
      fill="none" stroke="#7060A0" stroke-width="1.8" stroke-linecap="round" opacity="0.26"/>
    <path d="M 224,284 Q 212,296 202,304 Q 190,312 180,320 Q 168,330 158,338"
      fill="none" stroke="#605880" stroke-width="0.9" stroke-linecap="round" opacity="0.20"/>
    <path d="M 210,294 Q 198,288 196,300 Q 196,308 206,306"
      fill="none" stroke="#7868A8" stroke-width="0.7" opacity="0.22"/>
    <path d="M 174,322 Q 162,316 160,328 Q 161,336 170,334"
      fill="none" stroke="#7868A8" stroke-width="0.7" opacity="0.22"/>
    <circle cx="196" cy="298" r="1.8" fill="#7060A0" opacity="0.16"/>
    <circle cx="160" cy="326" r="1.8" fill="#7060A0" opacity="0.16"/>
    <circle cx="180" cy="314" r="1.5" fill="#7060A0" opacity="0.14"/>

    <!-- الله أكبر woven into left arm calligraphy — unchanged -->
    <text x="178" y="318"
      font-family="'Noto Naskh Arabic', 'Geeza Pro', 'Traditional Arabic', serif"
      font-size="4" fill="#7060A0" opacity="0.18"
      text-anchor="middle"
      transform="rotate(-35 178 318)"
      direction="rtl" xml:lang="ar"
      letter-spacing="0.4">الله أكبر</text>

    <!-- ── Right arm (mirror) ── -->
    <path d="M 282,278 Q 294,292 304,298 Q 318,306 326,316 Q 336,324 346,330 Q 356,338 364,344"
      fill="none" stroke="#7060A0" stroke-width="1.8" stroke-linecap="round" opacity="0.26"/>
    <path d="M 288,284 Q 300,296 310,304 Q 322,312 332,320 Q 344,330 354,338"
      fill="none" stroke="#605880" stroke-width="0.9" stroke-linecap="round" opacity="0.20"/>
    <path d="M 302,294 Q 314,288 316,300 Q 316,308 306,306"
      fill="none" stroke="#7868A8" stroke-width="0.7" opacity="0.22"/>
    <path d="M 338,322 Q 350,316 352,328 Q 351,336 342,334"
      fill="none" stroke="#7868A8" stroke-width="0.7" opacity="0.22"/>
    <circle cx="316" cy="298" r="1.8" fill="#7060A0" opacity="0.16"/>
    <circle cx="352" cy="326" r="1.8" fill="#7060A0" opacity="0.16"/>
    <circle cx="332" cy="314" r="1.5" fill="#7060A0" opacity="0.14"/>

    <!-- Decorative curve beneath gem -->
    <path d="M 234,280 Q 244,286 256,283 Q 268,280 278,285"
      fill="none" stroke="#605880" stroke-width="0.8" stroke-linecap="round" opacity="0.14"/>
  </g>

  <!-- ═══ 3D LAVENDER DIAMOND GEM — 55px radius (was 35px) ═══ -->

  <!-- Outer glow halo (new) -->
  <circle cx="256" cy="256" r="78" fill="url(#gemHalo)"/>

  <!-- Shadow base -->
  <polygon points="256,201 311,256 256,311 201,256"
    fill="#140A20" filter="url(#gemDrop)" opacity="0.75"/>

  <!-- Main gem -->
  <polygon points="256,201 311,256 256,311 201,256"
    fill="url(#gemBase)" filter="url(#gemSoft)"/>

  <!-- 4 quadrant faces -->
  <polygon points="256,201 201,256 256,256" fill="url(#faceTopL)"/>
  <polygon points="256,201 311,256 256,256" fill="url(#faceTopR)"/>
  <polygon points="201,256 256,311 256,256" fill="url(#faceBotL)"/>
  <polygon points="311,256 256,311 256,256" fill="url(#faceBotR)"/>

  <!-- Primary facet cross -->
  <line x1="256" y1="201" x2="256" y2="311" stroke="#3A2060" stroke-width="0.7" opacity="0.35"/>
  <line x1="201" y1="256" x2="311" y2="256" stroke="#3A2060" stroke-width="0.7" opacity="0.35"/>

  <!-- Secondary inner facets (scaled from original) -->
  <line x1="234" y1="222" x2="278" y2="222" stroke="#4A3878" stroke-width="0.45" opacity="0.20"/>
  <line x1="242" y1="236" x2="270" y2="236" stroke="#4A3878" stroke-width="0.38" opacity="0.16"/>
  <line x1="242" y1="276" x2="270" y2="276" stroke="#2A1B48" stroke-width="0.38" opacity="0.18"/>
  <line x1="234" y1="290" x2="278" y2="290" stroke="#2A1B48" stroke-width="0.45" opacity="0.22"/>
  <line x1="222" y1="234" x2="222" y2="278" stroke="#4A3878" stroke-width="0.38" opacity="0.16"/>
  <line x1="237" y1="244" x2="237" y2="268" stroke="#4A3878" stroke-width="0.30" opacity="0.12"/>
  <line x1="275" y1="234" x2="275" y2="278" stroke="#3A2860" stroke-width="0.38" opacity="0.18"/>
  <line x1="276" y1="244" x2="276" y2="268" stroke="#3A2860" stroke-width="0.30" opacity="0.14"/>

  <!-- 3D highlights -->
  <line x1="256" y1="203" x2="203" y2="256" stroke="#D8C8F0" stroke-width="0.9" opacity="0.18"/>
  <line x1="257" y1="203" x2="310" y2="255" stroke="#B8A8D0" stroke-width="0.5" opacity="0.08"/>
  <line x1="203" y1="257" x2="255" y2="309" stroke="#1A1028" stroke-width="0.6" opacity="0.18"/>
  <line x1="257" y1="309" x2="309" y2="257" stroke="#1A1028" stroke-width="0.6" opacity="0.22"/>

  <!-- Specular highlight — top-left facet -->
  <path d="M 220,222 L 240,222 L 240,242 L 220,242 Z" fill="#C8B8E0" opacity="0.06"/>
  <circle cx="228" cy="226" r="2.5" fill="#E0D4F8" opacity="0.14"/>
  <circle cx="234" cy="230" r="1.2" fill="#FFFFFF" opacity="0.16"/>

</svg>
